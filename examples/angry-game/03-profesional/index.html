<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Resortera — 03 profesional</title>
<style>
  :root {
    --bg:     #efe4cf;
    --sky:    #d8c69a;
    --ground: #5b3a1d;
    --grass:  #6a8f3c;
    --sling:  #3d2310;
    --proj:   #c1432f;
    --block:  #3f6fa3;
    --block-edge: #2a4d75;
    --fg:     #1f1a14;
    --accent: #c98a2b;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: linear-gradient(180deg, #f4ead6 0%, var(--bg) 100%);
    color: var(--fg);
    font: 14px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 12px;
    min-height: 100vh;
  }
  h1 {
    margin: 0 0 10px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .hud {
    display: flex;
    gap: 18px;
    align-items: center;
    margin-bottom: 10px;
    font-variant-numeric: tabular-nums;
  }
  .hud .stat strong { font-size: 16px; color: var(--accent); }
  .hud button {
    border: 2px solid var(--fg);
    background: transparent;
    color: var(--fg);
    padding: 5px 14px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .hud button:hover { background: var(--fg); color: var(--bg); }
  .hud button[aria-pressed="true"] {
    background: var(--fg); color: var(--bg);
  }
  .stage {
    position: relative;
    width: 100%;
    max-width: 1200px;
    aspect-ratio: 3 / 2;
    border: 2.5px solid var(--fg);
    background: var(--sky);
    box-shadow: 0 6px 0 rgba(31, 26, 20, 0.18);
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(239, 228, 207, 0.92);
  }
  .overlay.show { display: flex; }
  .overlay .panel {
    background: var(--bg);
    border: 2.5px solid var(--fg);
    padding: 22px 30px;
    text-align: center;
    box-shadow: 0 6px 0 rgba(31, 26, 20, 0.18);
  }
  .overlay button {
    margin-top: 14px;
    border: 2px solid var(--fg);
    background: transparent;
    color: var(--fg);
    padding: 7px 18px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
  }
  .hint { margin-top: 12px; font-size: 12px; color: #6a5b48; text-align: center; }
</style>
</head>
<body>
  <h1>Resortera — versión profesional</h1>
  <div class="hud">
    <span class="stat">Lanzamientos: <strong id="launches">0</strong></span>
    <span class="stat">Bloques: <strong id="knocked">0</strong>/<strong id="total">0</strong></span>
    <button id="reset" type="button">Reiniciar</button>
    <button id="mute" type="button" aria-pressed="false" aria-label="Mutear">🔊</button>
  </div>
  <div class="stage">
    <canvas id="c"></canvas>
    <div id="overlay" class="overlay">
      <div class="panel">
        <div id="overlay-msg" style="font-size: 18px; font-weight: 600;"></div>
        <button id="overlay-btn" type="button">Jugar de nuevo</button>
      </div>
    </div>
  </div>
  <div class="hint">Arrastrá el proyectil hacia atrás y soltá para lanzar. La trayectoria punteada predice el vuelo real.</div>

<script>
'use strict';
(() => {
  // ====================================================================
  // CONFIG — todas las constantes mágicas viven acá
  // ====================================================================
  const CONFIG = {
    logical:    { w: 1200, h: 800 },          // resolución lógica fija
    gravity:    1500,                          // px/s^2 (en coords lógicas)
    ground:     { y: 720 },
    sling:      { x: 160, y: 580 },
    projectile: { r: 18, restThreshold: 28, restTimeMs: 500 },
    pull:       { max: 240, power: 9.5 },
    bounds:     { margin: 60 },
    energyLoss: { ground: 0.42, block: 0.55 },
    knockEnergyThreshold: 220,
    physicsStepHz: 240,                        // sub-stepping para colisiones estables
    preview:     { steps: 90, stepDt: 1 / 60 },
    particles:   { count: 14, life: [280, 520], speed: [120, 380] },
    colors: {
      sky:        '#d8c69a',
      ground:     '#5b3a1d',
      groundLine: '#3d2310',
      grass:      '#6a8f3c',
      sling:      '#3d2310',
      slingBand:  '#7a4a22',
      rubber:     '#3d2310',
      proj:       '#c1432f',
      projShadow: 'rgba(31, 26, 20, 0.30)',
      block:      '#3f6fa3',
      blockEdge:  '#2a4d75',
      preview:    'rgba(31, 26, 20, 0.55)',
      previewDot: '#c1432f',
      particle:   '#c98a2b'
    }
  };

  // ====================================================================
  // ESTADO — un objeto state; las mutaciones pasan por funciones
  // ====================================================================
  const state = {
    projectile: makeProjectileAtRest(),
    blocks: [],
    slingshot: { dragging: false },
    particles: [],
    stats: { launches: 0, knocked: 0, total: 0, completed: false, restMs: 0 }
  };

  function makeProjectileAtRest() {
    return {
      x: CONFIG.sling.x,
      y: CONFIG.sling.y,
      vx: 0, vy: 0,
      active: false
    };
  }

  function buildBlocks() {
    const g = CONFIG.ground.y;
    const blocks = [];
    const add = (x, y, w, h) => blocks.push({ x, y, w, h, vy: 0, alive: true });

    // Estructura A — torre vertical
    add(720, g - 60, 60, 60);
    add(720, g - 120, 60, 60);
    add(720, g - 180, 60, 60);
    add(720, g - 240, 60, 60);

    // Estructura B — pirámide
    const bx = 870;
    add(bx,         g - 50, 50, 50);
    add(bx + 50,    g - 50, 50, 50);
    add(bx + 100,   g - 50, 50, 50);
    add(bx + 25,    g - 100, 50, 50);
    add(bx + 75,    g - 100, 50, 50);
    add(bx + 50,    g - 150, 50, 50);

    // Estructura C — torre delgada
    add(1080, g - 40, 50, 40);
    add(1080, g - 80, 50, 40);
    add(1080, g - 120, 50, 40);

    return blocks;
  }

  function resetGame() {
    state.projectile = makeProjectileAtRest();
    state.blocks = buildBlocks();
    state.slingshot.dragging = false;
    state.particles.length = 0;
    state.stats.launches = 0;
    state.stats.knocked = 0;
    state.stats.total = state.blocks.length;
    state.stats.completed = false;
    state.stats.restMs = 0;
    hideOverlay();
    syncHud();
  }

  function discardProjectile() {
    state.projectile = makeProjectileAtRest();
    state.stats.restMs = 0;
  }

  function knockBlock(b) {
    if (!b.alive) return;
    b.alive = false;
    state.stats.knocked += 1;
    spawnParticles(b.x + b.w / 2, b.y + b.h / 2);
    Audio.play('hit');
  }

  function spawnParticles(x, y) {
    const { count, life, speed } = CONFIG.particles;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const v = speed[0] + Math.random() * (speed[1] - speed[0]);
      state.particles.push({
        x, y,
        vx: Math.cos(angle) * v,
        vy: Math.sin(angle) * v - 80,
        life: 0,
        maxLife: life[0] + Math.random() * (life[1] - life[0])
      });
    }
  }

  // ====================================================================
  // FÍSICA — un solo `stepProjectile` se usa para el vuelo REAL y para
  // la PREVIEW de trayectoria. Así la línea no miente.
  // ====================================================================
  /**
   * Avanza el proyectil un paso. Si choca con un bloque, devuelve el
   * bloque chocado. Si rebota contra el suelo, lo refleja. La preview
   * usa esta misma función pero con bloques clonados (sin tocar el
   * estado real).
   */
  function stepProjectile(p, blocks, dt) {
    p.vy += CONFIG.gravity * dt;
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;

    // Suelo
    const groundY = CONFIG.ground.y;
    if (p.y + CONFIG.projectile.r >= groundY) {
      p.y = groundY - CONFIG.projectile.r;
      p.vy = -Math.abs(p.vy) * CONFIG.energyLoss.ground;
      p.vx *= 0.88;
    }

    // Colisión con bloques (círculo vs AABB)
    for (const b of blocks) {
      if (!b.alive) continue;
      const r = CONFIG.projectile.r;
      const cx = clamp(p.x, b.x, b.x + b.w);
      const cy = clamp(p.y, b.y, b.y + b.h);
      const dx = p.x - cx;
      const dy = p.y - cy;
      if (dx * dx + dy * dy >= r * r) continue;

      const penX = r - Math.abs(dx);
      const penY = r - Math.abs(dy);
      if (penX < penY) {
        p.vx = -p.vx * CONFIG.energyLoss.block;
        p.x += dx >= 0 ? penX : -penX;
      } else {
        p.vy = -p.vy * CONFIG.energyLoss.block;
        p.y += dy >= 0 ? penY : -penY;
        if (dy < 0) b.vy += 90;
      }
      return b;
    }
    return null;
  }

  function update(dt) {
    if (state.stats.completed) {
      updateParticles(dt);
      return;
    }
    updateProjectile(dt);
    updateBlocks(dt);
    updateParticles(dt);
    checkCompletion();
  }

  function updateProjectile(dt) {
    const p = state.projectile;
    if (!p.active) return;

    // sub-stepping para evitar tunneling con bloques chicos a alta velocidad
    const steps = Math.max(1, Math.ceil(dt * CONFIG.physicsStepHz));
    const subDt = dt / steps;
    for (let i = 0; i < steps; i++) {
      const hit = stepProjectile(p, state.blocks, subDt);
      if (hit) {
        const impact = Math.hypot(p.vx, p.vy);
        if (impact > CONFIG.knockEnergyThreshold) knockBlock(hit);
      }
    }

    // descartar si sale del canvas
    const m = CONFIG.bounds.margin;
    if (p.x < -m || p.x > CONFIG.logical.w + m || p.y < -300) {
      discardProjectile();
      return;
    }

    // reposo
    const speed = Math.hypot(p.vx, p.vy);
    if (speed < CONFIG.projectile.restThreshold) {
      state.stats.restMs += dt * 1000;
      if (state.stats.restMs > CONFIG.projectile.restTimeMs) discardProjectile();
    } else {
      state.stats.restMs = 0;
    }
  }

  function updateBlocks(dt) {
    for (const b of state.blocks) {
      if (!b.alive) continue;
      if (hasSupport(b)) {
        b.vy = 0;
        const supportTop = topOfSupport(b);
        if (supportTop !== null) b.y = supportTop - b.h;
        continue;
      }
      b.vy += CONFIG.gravity * dt;
      b.y  += b.vy * dt;
      if (b.y > CONFIG.logical.h) knockBlock(b);
    }
  }

  function hasSupport(block) { return topOfSupport(block) !== null; }

  function topOfSupport(block) {
    const tol = 2;
    if (block.y + block.h >= CONFIG.ground.y - tol) return CONFIG.ground.y;
    for (const other of state.blocks) {
      if (other === block || !other.alive) continue;
      const horizontalOverlap =
        block.x < other.x + other.w && block.x + block.w > other.x;
      const verticallyTouching =
        Math.abs((block.y + block.h) - other.y) <= tol;
      if (horizontalOverlap && verticallyTouching) return other.y;
    }
    return null;
  }

  function updateParticles(dt) {
    for (let i = state.particles.length - 1; i >= 0; i--) {
      const part = state.particles[i];
      part.life += dt * 1000;
      if (part.life >= part.maxLife) {
        state.particles.splice(i, 1);
        continue;
      }
      part.vy += CONFIG.gravity * dt * 0.7;
      part.x  += part.vx * dt;
      part.y  += part.vy * dt;
    }
  }

  function checkCompletion() {
    const remaining = state.blocks.filter((b) => b.alive).length;
    if (remaining === 0 && !state.stats.completed) {
      state.stats.completed = true;
      Audio.play('win');
      showOverlay(`¡Completado en ${state.stats.launches} lanzamiento${state.stats.launches === 1 ? '' : 's'}!`);
    }
  }

  /** Simula la trayectoria con la misma stepProjectile que el vuelo real. */
  function computePreviewPath(initialVx, initialVy) {
    const simP = {
      x: CONFIG.sling.x, y: CONFIG.sling.y,
      vx: initialVx, vy: initialVy, active: true
    };
    const simBlocks = state.blocks.map((b) => ({ ...b }));
    const path = [{ x: simP.x, y: simP.y }];
    for (let i = 0; i < CONFIG.preview.steps; i++) {
      const hit = stepProjectile(simP, simBlocks, CONFIG.preview.stepDt);
      path.push({ x: simP.x, y: simP.y });
      if (hit) break;
      if (simP.y + CONFIG.projectile.r >= CONFIG.ground.y - 1 &&
          Math.abs(simP.vy) < 20) break;
      const m = CONFIG.bounds.margin;
      if (simP.x < -m || simP.x > CONFIG.logical.w + m) break;
    }
    return path;
  }

  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

  // ====================================================================
  // RENDER — recibe state, dibuja. Nunca muta.
  // ====================================================================
  const canvas = /** @type {HTMLCanvasElement} */ (document.getElementById('c'));
  const ctx = canvas.getContext('2d');

  function resize() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = Math.round(rect.width  * dpr);
    canvas.height = Math.round(rect.height * dpr);
    // El canvas ahora dibuja en coords lógicas; el setTransform escala.
    ctx.setTransform(
      canvas.width / CONFIG.logical.w, 0, 0,
      canvas.height / CONFIG.logical.h, 0, 0
    );
  }

  function render() {
    const { w, h } = CONFIG.logical;
    // cielo
    ctx.fillStyle = CONFIG.colors.sky;
    ctx.fillRect(0, 0, w, h);

    drawGround();
    drawSlingshot();
    drawPreviewIfAny();
    drawBlocks();
    drawProjectileShadow();
    drawProjectile();
    drawParticles();
  }

  function drawGround() {
    const g = CONFIG.ground.y;
    const { w, h } = CONFIG.logical;
    // tierra
    ctx.fillStyle = CONFIG.colors.ground;
    ctx.fillRect(0, g, w, h - g);
    // pasto (franja superior)
    ctx.fillStyle = CONFIG.colors.grass;
    ctx.fillRect(0, g - 6, w, 6);
    // textura: líneas horizontales tenues
    ctx.strokeStyle = CONFIG.colors.groundLine;
    ctx.globalAlpha = 0.18;
    ctx.lineWidth = 1;
    for (let y = g + 16; y < h; y += 22) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawSlingshot() {
    const { x, y } = CONFIG.sling;
    const g = CONFIG.ground.y;
    // brazo izquierdo y derecho (con grosor)
    ctx.strokeStyle = CONFIG.colors.sling;
    ctx.lineWidth = 10;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x - 22, g);
    ctx.lineTo(x - 8,  y);
    ctx.moveTo(x + 22, g);
    ctx.lineTo(x + 8,  y);
    ctx.stroke();
    // banda decorativa
    ctx.strokeStyle = CONFIG.colors.slingBand;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x - 18, g - 18);
    ctx.lineTo(x + 18, g - 18);
    ctx.stroke();

    // goma cuando está cargada
    if (state.slingshot.dragging && !state.projectile.active) {
      const p = state.projectile;
      const stretch = Math.hypot(p.x - x, p.y - y);
      const thickness = 2 + Math.min(6, stretch / 40);
      ctx.strokeStyle = CONFIG.colors.rubber;
      ctx.lineWidth = thickness;
      ctx.beginPath();
      ctx.moveTo(x - 8, y);
      ctx.lineTo(p.x, p.y);
      ctx.lineTo(x + 8, y);
      ctx.stroke();
    }
  }

  function drawPreviewIfAny() {
    if (!state.slingshot.dragging || state.projectile.active) return;
    const p = state.projectile;
    const vx = (CONFIG.sling.x - p.x) * CONFIG.pull.power;
    const vy = (CONFIG.sling.y - p.y) * CONFIG.pull.power;
    const path = computePreviewPath(vx, vy);

    // línea punteada
    ctx.strokeStyle = CONFIG.colors.preview;
    ctx.setLineDash([6, 10]);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
    ctx.setLineDash([]);
    // punto final
    const end = path[path.length - 1];
    ctx.fillStyle = CONFIG.colors.previewDot;
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.arc(end.x, end.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function drawProjectileShadow() {
    const p = state.projectile;
    const g = CONFIG.ground.y;
    const altitude = Math.max(0, g - p.y);
    const r = CONFIG.projectile.r;
    const shadowW = r * (1.4 - Math.min(0.8, altitude / 500));
    const shadowH = Math.max(3, r * 0.35 - altitude / 300);
    ctx.fillStyle = CONFIG.colors.projShadow;
    ctx.beginPath();
    ctx.ellipse(p.x, g - 2, shadowW, shadowH, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawProjectile() {
    const p = state.projectile;
    const r = CONFIG.projectile.r;
    ctx.fillStyle = CONFIG.colors.proj;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
    // highlight pequeño para volumen
    ctx.fillStyle = 'rgba(255,255,255,0.30)';
    ctx.beginPath();
    ctx.arc(p.x - r * 0.35, p.y - r * 0.35, r * 0.30, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawBlocks() {
    for (const b of state.blocks) {
      if (!b.alive) continue;
      ctx.fillStyle = CONFIG.colors.block;
      ctx.fillRect(b.x, b.y, b.w, b.h);
      // borde
      ctx.strokeStyle = CONFIG.colors.blockEdge;
      ctx.lineWidth = 2;
      ctx.strokeRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
      // pequeña línea de "veta" para textura
      ctx.strokeStyle = CONFIG.colors.blockEdge;
      ctx.globalAlpha = 0.25;
      ctx.beginPath();
      ctx.moveTo(b.x + 4, b.y + b.h / 2);
      ctx.lineTo(b.x + b.w - 4, b.y + b.h / 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  function drawParticles() {
    ctx.fillStyle = CONFIG.colors.particle;
    for (const part of state.particles) {
      const t = part.life / part.maxLife;
      ctx.globalAlpha = 1 - t;
      const size = 4 * (1 - t * 0.6);
      ctx.beginPath();
      ctx.arc(part.x, part.y, size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ====================================================================
  // INPUT — handlers de mouse/touch. Actualizan state, nada más.
  // Mouseup/touchend en window: el drag funciona incluso si soltás fuera.
  // ====================================================================
  function getLogicalPointer(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return {
      x: cx * CONFIG.logical.w / rect.width,
      y: cy * CONFIG.logical.h / rect.height
    };
  }

  function onPointerDown(e) {
    if (state.stats.completed) return;
    if (state.projectile.active) return;
    const pos = getLogicalPointer(e);
    const p = state.projectile;
    const dx = pos.x - p.x;
    const dy = pos.y - p.y;
    const tol = CONFIG.projectile.r + 14;
    if (dx * dx + dy * dy > tol * tol) return;
    state.slingshot.dragging = true;
    Audio.ensure();
    if (e.preventDefault) e.preventDefault();
  }

  function onPointerMove(e) {
    if (!state.slingshot.dragging) return;
    const pos = getLogicalPointer(e);
    let dx = pos.x - CONFIG.sling.x;
    let dy = pos.y - CONFIG.sling.y;
    // restringir al hemisferio "atrás" de la sling: el proyectil no
    // puede pasar a la derecha de la sling. Si el jugador arrastra
    // hacia adelante, lo clampeamos en x = 0 relativo.
    if (dx > 0) dx = 0;
    // limitar verticalmente para que no atraviese el suelo
    const maxDy = CONFIG.ground.y - CONFIG.sling.y - CONFIG.projectile.r - 6;
    if (dy > maxDy) dy = maxDy;
    const dist = Math.hypot(dx, dy);
    if (dist > CONFIG.pull.max) {
      dx = dx * CONFIG.pull.max / dist;
      dy = dy * CONFIG.pull.max / dist;
    }
    state.projectile.x = CONFIG.sling.x + dx;
    state.projectile.y = CONFIG.sling.y + dy;
    if (e.preventDefault) e.preventDefault();
  }

  function onPointerUp(e) {
    if (!state.slingshot.dragging) return;
    state.slingshot.dragging = false;
    const p = state.projectile;
    const pullX = CONFIG.sling.x - p.x;
    const pullY = CONFIG.sling.y - p.y;
    if (Math.hypot(pullX, pullY) < 10) {
      p.x = CONFIG.sling.x;
      p.y = CONFIG.sling.y;
      return;
    }
    p.vx = pullX * CONFIG.pull.power;
    p.vy = pullY * CONFIG.pull.power;
    p.active = true;
    state.stats.launches += 1;
    syncHud();
    Audio.play('launch');
    if (e && e.preventDefault) e.preventDefault();
  }

  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  // mousemove/up en window: si soltás fuera del canvas, igual dispara
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  window.addEventListener('touchmove', onPointerMove, { passive: false });
  window.addEventListener('touchend', onPointerUp);
  window.addEventListener('blur', () => { if (state.slingshot.dragging) onPointerUp(); });

  document.getElementById('reset').addEventListener('click', resetGame);
  document.getElementById('overlay-btn').addEventListener('click', resetGame);

  // ====================================================================
  // AUDIO — WebAudio puro, SFX generados en runtime, sin archivos
  // ====================================================================
  const Audio = (() => {
    let ctxA = null;
    let muted = false;
    function ensure() {
      if (ctxA) return;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      ctxA = new AC();
    }
    function envelopedTone(freqStart, freqEnd, durMs, type, gain) {
      if (!ctxA || muted) return;
      const now = ctxA.currentTime;
      const osc = ctxA.createOscillator();
      const g = ctxA.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freqStart, now);
      osc.frequency.exponentialRampToValueAtTime(Math.max(40, freqEnd), now + durMs / 1000);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(gain, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now + durMs / 1000);
      osc.connect(g).connect(ctxA.destination);
      osc.start(now);
      osc.stop(now + durMs / 1000 + 0.02);
    }
    function play(kind) {
      ensure();
      if (!ctxA || muted) return;
      if (kind === 'launch') {
        envelopedTone(420, 90, 180, 'square', 0.22);
      } else if (kind === 'hit') {
        const base = 140 + Math.random() * 90;
        envelopedTone(base * 2, base, 140, 'triangle', 0.25);
      } else if (kind === 'win') {
        envelopedTone(523, 523, 160, 'sine', 0.18);
        setTimeout(() => envelopedTone(659, 659, 160, 'sine', 0.18), 120);
        setTimeout(() => envelopedTone(784, 784, 260, 'sine', 0.2), 240);
      }
    }
    function setMuted(v) { muted = v; }
    function isMuted() { return muted; }
    return { ensure, play, setMuted, isMuted };
  })();

  const muteBtn = document.getElementById('mute');
  muteBtn.addEventListener('click', () => {
    Audio.ensure();
    Audio.setMuted(!Audio.isMuted());
    muteBtn.textContent = Audio.isMuted() ? '🔇' : '🔊';
    muteBtn.setAttribute('aria-pressed', Audio.isMuted() ? 'true' : 'false');
  });

  // ====================================================================
  // HUD + overlay
  // ====================================================================
  const launchesEl = document.getElementById('launches');
  const knockedEl  = document.getElementById('knocked');
  const totalEl    = document.getElementById('total');
  const overlayEl  = document.getElementById('overlay');
  const overlayMsg = document.getElementById('overlay-msg');

  function syncHud() {
    launchesEl.textContent = String(state.stats.launches);
    knockedEl.textContent  = String(state.stats.knocked);
    totalEl.textContent    = String(state.stats.total);
  }
  function showOverlay(msg) {
    overlayMsg.textContent = msg;
    overlayEl.classList.add('show');
  }
  function hideOverlay() { overlayEl.classList.remove('show'); }

  // ====================================================================
  // Game loop
  // ====================================================================
  let lastT = performance.now();
  function frame(now) {
    const dt = Math.min((now - lastT) / 1000, 1 / 30);
    lastT = now;
    update(dt);
    render();
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize);
  resize();
  resetGame();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
