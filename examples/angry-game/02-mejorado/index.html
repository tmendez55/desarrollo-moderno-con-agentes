<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Resortera — 02 mejorado</title>
<style>
  body {
    margin: 0;
    background: #f0f0f0;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    min-height: 100vh;
  }
  h1 { margin: 0 0 10px; font-size: 18px; color: #333; }
  .hud { margin-bottom: 10px; color: #333; }
  .hud button {
    margin-left: 8px;
    padding: 3px 10px;
    font: inherit;
    cursor: pointer;
  }
  .wrap {
    width: 100%;
    max-width: 900px;
    aspect-ratio: 3 / 2;
    border: 1px solid #cccccc;
    background: #ffffff;
  }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  .hint { margin-top: 10px; font-size: 12px; color: #666; text-align: center; }
</style>
</head>
<body>
  <h1>Resortera</h1>
  <div class="hud">
    Lanzamientos: <span id="launches">0</span> |
    Bloques: <span id="knocked">0</span>/<span id="total">0</span>
    <button id="reset" type="button">Reiniciar</button>
  </div>
  <div class="wrap"><canvas id="c"></canvas></div>
  <div class="hint">Arrastrá el proyectil hacia atrás y soltá para lanzar.</div>

<script>
  // Coordenadas lógicas fijas; el render se escala al tamaño del canvas.
  var LW = 900, LH = 600;

  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var launchesEl = document.getElementById('launches');
  var knockedEl  = document.getElementById('knocked');
  var totalEl    = document.getElementById('total');
  var resetBtn   = document.getElementById('reset');

  var GRAVITY = 1200;
  var GROUND_Y = 540;
  var SLING_X = 130;
  var SLING_Y = 460;
  var PROJECTILE_R = 14;
  var MAX_PULL = 150;
  var POWER = 7;
  var REST_SPEED = 30;
  var REST_MS = 600;

  var COLORS = {
    bg: '#ffffff',
    ground: '#444444',
    sling: '#222222',
    rubber: '#888888',
    proj: '#d24b4b',
    block: '#5a8fbb'
  };

  var launches = 0;
  var knocked = 0;

  var projectile = {
    x: SLING_X, y: SLING_Y,
    vx: 0, vy: 0,
    flying: false,
    dragging: false,
    restMs: 0
  };

  var blocks = [];

  function buildBlocks() {
    blocks = [];
    var g = GROUND_Y;
    // estructura A — torre vertical
    addBlock(560, g - 50,  50, 50);
    addBlock(560, g - 100, 50, 50);
    addBlock(560, g - 150, 50, 50);
    addBlock(560, g - 200, 50, 50);
    // estructura B — pirámide
    addBlock(680, g - 40, 40, 40);
    addBlock(720, g - 40, 40, 40);
    addBlock(760, g - 40, 40, 40);
    addBlock(700, g - 80, 40, 40);
    addBlock(740, g - 80, 40, 40);
    addBlock(720, g - 120, 40, 40);
    // estructura C — par horizontal
    addBlock(820, g - 30, 60, 30);
    addBlock(820, g - 60, 60, 30);
  }
  function addBlock(x, y, w, h) {
    blocks.push({ x: x, y: y, w: w, h: h, alive: true });
  }

  function resetProjectile() {
    projectile.x = SLING_X;
    projectile.y = SLING_Y;
    projectile.vx = 0;
    projectile.vy = 0;
    projectile.flying = false;
    projectile.dragging = false;
    projectile.restMs = 0;
  }

  function resetGame() {
    resetProjectile();
    buildBlocks();
    launches = 0;
    knocked = 0;
    syncHud();
  }

  function syncHud() {
    launchesEl.textContent = launches;
    knockedEl.textContent = knocked;
    totalEl.textContent = blocks.length;
  }

  // --- canvas responsive: backing store según devicePixelRatio + escala lógica
  function resize() {
    var rect = canvas.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    canvas.width  = Math.round(rect.width  * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(canvas.width / LW, canvas.height / LH);
  }
  window.addEventListener('resize', resize);

  // --- input
  function getLogicalPointer(e) {
    var rect = canvas.getBoundingClientRect();
    var cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    var cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return { x: cx * LW / rect.width, y: cy * LH / rect.height };
  }

  function onDown(e) {
    if (projectile.flying) return;
    var p = getLogicalPointer(e);
    var dx = p.x - projectile.x;
    var dy = p.y - projectile.y;
    var tol = PROJECTILE_R + 12;
    if (dx * dx + dy * dy <= tol * tol) {
      projectile.dragging = true;
      e.preventDefault();
    }
  }

  function onMove(e) {
    if (!projectile.dragging) return;
    var p = getLogicalPointer(e);
    var dx = p.x - SLING_X;
    var dy = p.y - SLING_Y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > MAX_PULL) {
      dx = dx * MAX_PULL / dist;
      dy = dy * MAX_PULL / dist;
    }
    projectile.x = SLING_X + dx;
    projectile.y = SLING_Y + dy;
    e.preventDefault();
  }

  function onUp() {
    if (!projectile.dragging) return;
    projectile.dragging = false;
    var pullX = SLING_X - projectile.x;
    var pullY = SLING_Y - projectile.y;
    if (Math.hypot(pullX, pullY) < 8) {
      // estiramiento insignificante: no cuenta
      resetProjectile();
      return;
    }
    projectile.vx = pullX * POWER;
    projectile.vy = pullY * POWER;
    projectile.flying = true;
    launches++;
    syncHud();
  }

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  // mouseup/touchend en window: si soltás fuera del canvas, igual dispara
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onUp);

  resetBtn.addEventListener('click', resetGame);

  // --- update
  var lastT = performance.now();
  function step(now) {
    var dt = Math.min((now - lastT) / 1000, 1 / 30);
    lastT = now;
    update(dt);
    render();
    requestAnimationFrame(step);
  }

  function update(dt) {
    if (!projectile.flying) return;

    projectile.vy += GRAVITY * dt;
    projectile.x += projectile.vx * dt;
    projectile.y += projectile.vy * dt;

    // suelo
    if (projectile.y + PROJECTILE_R >= GROUND_Y) {
      projectile.y = GROUND_Y - PROJECTILE_R;
      projectile.vy = -projectile.vy * 0.4;
      projectile.vx *= 0.85;
    }

    // colisión con bloques
    for (var i = 0; i < blocks.length; i++) {
      var b = blocks[i];
      if (!b.alive) continue;
      if (projectile.x + PROJECTILE_R > b.x &&
          projectile.x - PROJECTILE_R < b.x + b.w &&
          projectile.y + PROJECTILE_R > b.y &&
          projectile.y - PROJECTILE_R < b.y + b.h) {
        b.alive = false;
        knocked++;
        syncHud();
        projectile.vx *= 0.55;
        projectile.vy *= 0.55;
      }
    }

    // fuera del canvas
    if (projectile.x < -40 || projectile.x > LW + 40 || projectile.y < -200) {
      resetProjectile();
      return;
    }

    // reposo: si casi no se mueve, descartar
    var speed = Math.hypot(projectile.vx, projectile.vy);
    if (speed < REST_SPEED) {
      projectile.restMs += dt * 1000;
      if (projectile.restMs > REST_MS) resetProjectile();
    } else {
      projectile.restMs = 0;
    }
  }

  // --- render
  function render() {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, LW, LH);

    ctx.fillStyle = COLORS.ground;
    ctx.fillRect(0, GROUND_Y, LW, LH - GROUND_Y);

    // resortera
    ctx.strokeStyle = COLORS.sling;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(SLING_X - 14, GROUND_Y);
    ctx.lineTo(SLING_X - 5,  SLING_Y);
    ctx.moveTo(SLING_X + 14, GROUND_Y);
    ctx.lineTo(SLING_X + 5,  SLING_Y);
    ctx.stroke();

    if (!projectile.flying) {
      ctx.strokeStyle = COLORS.rubber;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(SLING_X - 5, SLING_Y);
      ctx.lineTo(projectile.x, projectile.y);
      ctx.lineTo(SLING_X + 5, SLING_Y);
      ctx.stroke();
    }

    // bloques
    ctx.fillStyle = COLORS.block;
    for (var i = 0; i < blocks.length; i++) {
      var b = blocks[i];
      if (!b.alive) continue;
      ctx.fillRect(b.x, b.y, b.w, b.h);
    }

    // proyectil
    ctx.fillStyle = COLORS.proj;
    ctx.beginPath();
    ctx.arc(projectile.x, projectile.y, PROJECTILE_R, 0, Math.PI * 2);
    ctx.fill();
  }

  resize();
  resetGame();
  requestAnimationFrame(step);
</script>
</body>
</html>
